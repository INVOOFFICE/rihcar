<section id="reservation" class="py-28 relative" style="background:linear-gradient(to bottom,#040404,#060606)">
    <div class="absolute top-0 left-0 right-0 h-px" style="background:linear-gradient(90deg,transparent,rgba(212,175,55,0.2),transparent)"></div>

    <div class="max-w-2xl mx-auto px-4 sm:px-6">
        <div class="text-center mb-12 fade-up">
            <div class="section-label">
                <span class="text-gold-400 uppercase tracking-[0.25em] text-xs font-semibold">Réservation Rapide</span>
            </div>
            <h2 class="font-serif text-4xl sm:text-5xl font-bold mb-4">Réservez Votre Voiture</h2>
            <div class="divider-gold mx-auto mb-5"></div>
            <p class="text-gray-500 max-w-xl mx-auto text-sm">Remplissez le formulaire. Vous serez redirigé vers WhatsApp avec un message pré-rempli.</p>
        </div>

        <div class="glass-strong rounded-3xl p-8 sm:p-10 fade-up" style="transition-delay:0.1s">

            <!-- Progress bar -->
            <div class="mb-8">
                <div class="flex items-center justify-between mb-3">
                    <span class="text-xs text-gray-500 uppercase tracking-wider">Étape <span id="currentStepText">1</span> sur 3</span>
                    <span class="text-xs text-gold-400 font-medium" id="stepLabel">Vos informations</span>
                </div>
                <div class="h-1.5 bg-white/5 rounded-full overflow-hidden">
                    <div class="progress-bar-fill h-full rounded-full" id="progressBar" style="width:33.33%"></div>
                </div>
                <div class="flex justify-between mt-3">
                    <div class="flex items-center gap-1.5 text-xs text-gray-500">
                        <span class="step-dot active" id="dot1"></span>
                        <span>Infos</span>
                    </div>
                    <div class="flex items-center gap-1.5 text-xs text-gray-500">
                        <span class="step-dot" id="dot2"></span>
                        <span>Trajet</span>
                    </div>
                    <div class="flex items-center gap-1.5 text-xs text-gray-500">
                        <span class="step-dot" id="dot3"></span>
                        <span>Véhicule</span>
                    </div>
                </div>
            </div>

            <form id="bookingForm" novalidate>

                <!-- Step 1 -->
                <div class="step active" id="step1">
                    <div class="space-y-5">
                        <div>
                            <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Nom Complet</label>
                            <input type="text" id="userName" placeholder="Votre nom complet" class="input-field" required>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Téléphone</label>
                            <input type="tel" id="userPhone" placeholder="+212 6XX XXX XXX" class="input-field" required>
                        </div>
                    </div>
                    <button type="button" onclick="nextStep(1)" class="btn-gold w-full mt-8 py-4 rounded-2xl font-semibold text-base flex items-center justify-center gap-2">
                        Continuer <i class="fas fa-arrow-right text-sm"></i>
                    </button>
                </div>

                <!-- Step 2 -->
                <div class="step" id="step2">
                    <div class="space-y-5">
                        <div>
                            <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Lieu de Prise en Charge</label>
                            <select id="pickupLocation" class="input-field" required>
                                <option value="" disabled selected>Choisir une ville</option>
                                <option>Errachidia</option><option>Rich</option><option>Arfoud</option>
                                <option>Merzouga</option><option>Midelt</option><option>Fès</option>
                                <option>Meknès</option><option>Tinghir</option><option>Ouarzazate</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Lieu de Retour</label>
                            <select id="dropoffLocation" class="input-field" required>
                                <option value="" disabled selected>Choisir une ville</option>
                                <option>Errachidia</option><option>Rich</option><option>Arfoud</option>
                                <option>Merzouga</option><option>Midelt</option><option>Fès</option>
                                <option>Meknès</option><option>Tinghir</option><option>Ouarzazate</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Date de Location</label>
                            <input type="date" id="rentalDate" class="input-field" required>
                        </div>
                    </div>
                    <div class="flex gap-3 mt-8">
                        <button type="button" onclick="prevStep(2)" class="btn-outline flex-1 py-4 rounded-2xl font-semibold text-sm flex items-center justify-center gap-2">
                            <i class="fas fa-arrow-left text-sm"></i> Retour
                        </button>
                        <button type="button" onclick="nextStep(2)" class="btn-gold flex-2 py-4 rounded-2xl font-semibold text-sm flex items-center justify-center gap-2" style="flex:2">
                            Continuer <i class="fas fa-arrow-right text-sm"></i>
                        </button>
                    </div>
                </div>

                <!-- Step 3 -->
                <div class="step" id="step3">
                    <div>
                        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Véhicule Souhaité</label>
                        <div class="space-y-3" id="carOptions"></div>
                    </div>
                    <div class="flex gap-3 mt-8">
                        <button type="button" onclick="prevStep(3)" class="btn-outline flex-1 py-4 rounded-2xl font-semibold text-sm flex items-center justify-center gap-2">
                            <i class="fas fa-arrow-left text-sm"></i> Retour
                        </button>
                        <button type="submit" class="btn-gold flex-2 py-4 rounded-2xl font-bold text-sm flex items-center justify-center gap-2" style="flex:2">
                            <i class="fab fa-whatsapp text-lg"></i>
                            Envoyer sur WhatsApp
                        </button>
                    </div>
                </div>
            </form>

            <p class="text-center text-gray-600 text-xs mt-6 flex items-center justify-center gap-2">
                <i class="fas fa-lock text-gold-900"></i>
                Vous serez redirigé vers WhatsApp avec un message pré-rempli
            </p>
        </div>
    </div>
</section>
